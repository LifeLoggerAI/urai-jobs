name: URAI Jobs Deploy Publish

on:
  workflow_dispatch:
    inputs:
      confirm_launch_unlock:
        description: Type LAUNCH-UNLOCK to confirm production signoffs are complete
        required: true
        type: string
      deploy_workers:
        description: Deploy Cloud Run workers before Firebase deploy
        required: true
        default: true
        type: boolean
      run_smoke:
        description: Run callable production smoke after deploy
        required: true
        default: false
        type: boolean
      confirm_prod_smoke_data_touch:
        description: Type I_UNDERSTAND_THIS_TOUCHES_PRODUCTION_DATA to allow smoke user/job writes when run_smoke=true
        required: false
        default: ""
        type: string
      require_custom_domains:
        description: Fail deployment if uraijobs.com and www are not serving the app shell
        required: true
        default: false
        type: boolean

concurrency:
  group: urai-jobs-production-deploy
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DEPLOY_PROJECT_ID: ${{ secrets.URAI_JOBS_FIREBASE_PROJECT_ID || secrets.FIREBASE_PROJECT_ID || secrets.GCLOUD_PROJECT || secrets.GOOGLE_CLOUD_PROJECT || 'urai-jobs' }}
  GCP_REGION: ${{ secrets.GCP_REGION || 'us-central1' }}
  API_ALLOWED_ORIGINS: ${{ secrets.API_ALLOWED_ORIGINS || 'https://uraijobs.com,https://www.uraijobs.com,https://urai-jobs-563121397472.web.app,https://urai-jobs.web.app' }}
  FIREBASE_HOSTING_SITE: ${{ secrets.FIREBASE_HOSTING_SITE || 'urai-jobs-563121397472' }}
  GCS_BUCKET_NAME: urai-jobs-urai-jobs-artifacts

jobs:
  deploy-publish:
    name: Deploy and publish URAI Jobs Runtime
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: prod

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Require explicit launch unlock
        run: |
          if [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            echo "Production deploy is workflow_dispatch-only."
            exit 1
          fi
          if [ "${{ inputs.confirm_launch_unlock }}" != "LAUNCH-UNLOCK" ]; then
            echo "confirm_launch_unlock must exactly equal LAUNCH-UNLOCK."
            exit 1
          fi
          if [ "${{ inputs.run_smoke }}" = "true" ] && [ "${{ inputs.confirm_prod_smoke_data_touch }}" != "I_UNDERSTAND_THIS_TOUCHES_PRODUCTION_DATA" ]; then
            echo "run_smoke=true requires confirm_prod_smoke_data_touch=I_UNDERSTAND_THIS_TOUCHES_PRODUCTION_DATA."
            exit 1
          fi

      - name: Require configured webhook signing secret
        env:
          CONFIGURED_WEBHOOK_SIGNING_SECRET: ${{ secrets.WEBHOOK_SIGNING_SECRET }}
        run: |
          if [ -z "$CONFIGURED_WEBHOOK_SIGNING_SECRET" ]; then
            echo "WEBHOOK_SIGNING_SECRET must be configured as a stable production secret."
            exit 1
          fi
          echo "WEBHOOK_SIGNING_SECRET=$CONFIGURED_WEBHOOK_SIGNING_SECRET" >> "$GITHUB_ENV"
          echo "[PASS] Using configured WEBHOOK_SIGNING_SECRET."

      - name: Enable pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.15.9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Java 21 for Firebase tooling
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_URAI_JOBS || secrets.GCP_SERVICE_ACCOUNT_JSON }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.DEPLOY_PROJECT_ID }}

      - name: Install Firebase CLI
        run: pnpm add -g firebase-tools

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Local verification gates
        run: |
          pnpm activation:verify
          pnpm urai-jobs:verify
          pnpm urai-jobs:smoke
          pnpm typecheck
          pnpm build
          pnpm urai-jobs:deploy-precheck

      - name: Ensure artifact bucket
        env:
          GCLOUD_PROJECT: ${{ env.DEPLOY_PROJECT_ID }}
          GCP_REGION: ${{ env.GCP_REGION }}
          GCS_BUCKET_NAME: ${{ env.GCS_BUCKET_NAME }}
        run: bash scripts/ensure-gcs-bucket.sh

      - name: Deploy Cloud Run workers
        if: ${{ inputs.deploy_workers }}
        env:
          URAI_ENV: prod
          GCLOUD_PROJECT: ${{ env.DEPLOY_PROJECT_ID }}
          GCP_REGION: ${{ env.GCP_REGION }}
          GCS_BUCKET_NAME: ${{ env.GCS_BUCKET_NAME }}
          URAI_JOBS_WORKER_TOKEN: ${{ secrets.URAI_JOBS_WORKER_TOKEN }}
        run: pnpm deploy:workers

      - name: Export Cloud Run worker URLs
        env:
          FIREBASE_PROJECT_ID: ${{ env.DEPLOY_PROJECT_ID }}
          GCLOUD_PROJECT: ${{ env.DEPLOY_PROJECT_ID }}
          GOOGLE_CLOUD_PROJECT: ${{ env.DEPLOY_PROJECT_ID }}
          GCP_REGION: ${{ env.GCP_REGION }}
        run: node scripts/export-worker-urls.mjs

      - name: Production env precheck
        env:
          URAI_ENV: prod
          NODE_ENV: production
          FIREBASE_PROJECT_ID: ${{ env.DEPLOY_PROJECT_ID }}
          GCLOUD_PROJECT: ${{ env.DEPLOY_PROJECT_ID }}
          GOOGLE_CLOUD_PROJECT: ${{ env.DEPLOY_PROJECT_ID }}
          GCP_REGION: ${{ env.GCP_REGION }}
          API_ALLOWED_ORIGINS: ${{ env.API_ALLOWED_ORIGINS }}
          GCS_BUCKET_NAME: ${{ env.GCS_BUCKET_NAME }}
          WEBHOOK_SIGNING_SECRET: ${{ secrets.WEBHOOK_SIGNING_SECRET }}
          URAI_JOBS_WORKER_TOKEN: ${{ secrets.URAI_JOBS_WORKER_TOKEN }}
          WORKER_SERVICE_ACCOUNT_EMAIL: ${{ secrets.WORKER_SERVICE_ACCOUNT_EMAIL }}
          FIREBASE_HOSTING_SITE: ${{ env.FIREBASE_HOSTING_SITE }}
        run: pnpm prod:precheck

      - name: System audit before publish
        env:
          URAI_ENV: prod
          NODE_ENV: production
          FIREBASE_PROJECT_ID: ${{ env.DEPLOY_PROJECT_ID }}
          GCLOUD_PROJECT: ${{ env.DEPLOY_PROJECT_ID }}
          GOOGLE_CLOUD_PROJECT: ${{ env.DEPLOY_PROJECT_ID }}
          GCP_REGION: ${{ env.GCP_REGION }}
          API_ALLOWED_ORIGINS: ${{ env.API_ALLOWED_ORIGINS }}
          GCS_BUCKET_NAME: ${{ env.GCS_BUCKET_NAME }}
          WEBHOOK_SIGNING_SECRET: ${{ secrets.WEBHOOK_SIGNING_SECRET }}
          URAI_JOBS_WORKER_TOKEN: ${{ secrets.URAI_JOBS_WORKER_TOKEN }}
          WORKER_SERVICE_ACCOUNT_EMAIL: ${{ secrets.WORKER_SERVICE_ACCOUNT_EMAIL }}
          FIREBASE_HOSTING_SITE: ${{ env.FIREBASE_HOSTING_SITE }}
        run: pnpm audit:systems

      - name: Deploy Firebase runtime
        env:
          URAI_ENV: prod
          FIREBASE_PROJECT_ID: ${{ env.DEPLOY_PROJECT_ID }}
          GCLOUD_PROJECT: ${{ env.DEPLOY_PROJECT_ID }}
          GOOGLE_CLOUD_PROJECT: ${{ env.DEPLOY_PROJECT_ID }}
          GCP_REGION: ${{ env.GCP_REGION }}
          API_ALLOWED_ORIGINS: ${{ env.API_ALLOWED_ORIGINS }}
          GCS_BUCKET_NAME: ${{ env.GCS_BUCKET_NAME }}
          WEBHOOK_SIGNING_SECRET: ${{ secrets.WEBHOOK_SIGNING_SECRET }}
          URAI_JOBS_WORKER_TOKEN: ${{ secrets.URAI_JOBS_WORKER_TOKEN }}
          WORKER_SERVICE_ACCOUNT_EMAIL: ${{ secrets.WORKER_SERVICE_ACCOUNT_EMAIL }}
          FIREBASE_HOSTING_SITE: ${{ env.FIREBASE_HOSTING_SITE }}
        run: pnpm deploy:firebase:prod -- prod

      - name: Verify canonical Firebase Hosting URLs
        run: pnpm domains:verify -- https://urai-jobs-563121397472.web.app https://urai-jobs.web.app

      - name: Verify custom domains
        if: ${{ inputs.require_custom_domains }}
        run: pnpm domains:verify -- https://uraijobs.com https://www.uraijobs.com

      - name: Custom domains pending notice
        if: ${{ !inputs.require_custom_domains }}
        run: |
          echo "Custom domain verification is non-blocking for this publish run."
          echo "Run again with require_custom_domains=true after Firebase Hosting custom domains and DNS are configured."
          pnpm domains:verify -- https://uraijobs.com https://www.uraijobs.com || true

      - name: Verify workers
        run: pnpm prod:verify-workers

      - name: Production callable smoke
        if: ${{ inputs.run_smoke }}
        env:
          FIREBASE_PROJECT_ID: ${{ env.DEPLOY_PROJECT_ID }}
          GCLOUD_PROJECT: ${{ env.DEPLOY_PROJECT_ID }}
          GCP_REGION: ${{ env.GCP_REGION }}
          PROD_SMOKE_ID_TOKEN: ${{ secrets.PROD_SMOKE_ID_TOKEN }}
          PROD_SMOKE_JOB_TYPE: narrator.tts
          PROD_SMOKE_TEXT: URAI Jobs Runtime production smoke test
          URAI_JOBS_PROD_SMOKE_UNLOCK: ${{ inputs.confirm_prod_smoke_data_touch }}
        run: pnpm prod:smoke

      - name: Stamp deployment artifact
        env:
          URAI_ENV: prod
          FIREBASE_PROJECT_ID: ${{ env.DEPLOY_PROJECT_ID }}
          GCLOUD_PROJECT: ${{ env.DEPLOY_PROJECT_ID }}
          GOOGLE_CLOUD_PROJECT: ${{ env.DEPLOY_PROJECT_ID }}
          GCP_REGION: ${{ env.GCP_REGION }}
          GCS_BUCKET_NAME: ${{ env.GCS_BUCKET_NAME }}
          FIREBASE_HOSTING_SITE: ${{ env.FIREBASE_HOSTING_SITE }}
        run: pnpm prod:stamp

      - name: Upload deployment evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: urai-jobs-deployment-evidence
          path: docs/release-evidence/*.md
          if-no-files-found: warn
          retention-days: 90
