name: URAI Jobs Production Deploy

on:
  workflow_dispatch:
    inputs:
      confirm_launch_unlock:
        description: "Type LAUNCH-UNLOCK to confirm signoffs are complete"
        required: true
        type: string
      production_url:
        description: "Production base URL for smoke checks"
        required: false
        default: "https://www.uraijobs.com"
        type: string
      skip_smoke:
        description: "Skip production smoke after deploy"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

jobs:
  deploy:
    name: Deploy URAI Jobs to Firebase
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Require explicit launch unlock
        run: |
          if [ "${{ github.event.inputs.confirm_launch_unlock }}" != "LAUNCH-UNLOCK" ]; then
            echo "confirm_launch_unlock must exactly equal LAUNCH-UNLOCK."
            exit 1
          fi
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.15.9
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install
        run: pnpm install --no-frozen-lockfile
      - name: Verify launch signoffs complete
        run: |
          pnpm urai-jobs:verify
          if grep -q "Status: PENDING" verification/signoffs.md; then
            echo "Launch signoffs are still pending. Complete verification/signoffs.md before production deploy."
            exit 1
          fi
      - name: Build web and functions
        run: |
          pnpm --dir web typecheck
          pnpm --dir web build
          pnpm --filter @urai-jobs/shared-types build
          pnpm --filter urai-jobs-functions build
      - name: Verify Firebase deploy secrets
        run: |
          if [ -z "${{ secrets.FIREBASE_SERVICE_ACCOUNT_URAI_JOBS }}" ]; then
            echo "Missing GitHub secret: FIREBASE_SERVICE_ACCOUNT_URAI_JOBS"
            exit 1
          fi
          if [ -z "${{ secrets.URAI_JOBS_FIREBASE_PROJECT_ID }}" ]; then
            echo "Missing GitHub secret: URAI_JOBS_FIREBASE_PROJECT_ID"
            exit 1
          fi
          echo "Firebase deploy secrets are present."
      - name: Install Firebase Tools
        run: npm install -g firebase-tools
      - name: Write Firebase service account
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_URAI_JOBS }}' > "$RUNNER_TEMP/firebase-service-account.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/firebase-service-account.json" >> "$GITHUB_ENV"
      - name: Deploy Firebase target
        run: firebase deploy --project "${{ secrets.URAI_JOBS_FIREBASE_PROJECT_ID }}" --only firestore:rules,firestore:indexes,functions,hosting --non-interactive
      - name: Production smoke
        if: ${{ github.event.inputs.skip_smoke != 'true' }}
        run: |
          URL="${{ github.event.inputs.production_url }}"
          curl -fsS "$URL" | grep -q "URAI Jobs"
          curl -fsS "$URL/privacy" | grep -q "Privacy"
          curl -fsS "$URL/terms" | grep -q "Terms"
          curl -fsS "$URL/trust" | grep -q "Trust"
      - name: Smoke skipped notice
        if: ${{ github.event.inputs.skip_smoke == 'true' }}
        run: echo "Production smoke was skipped by workflow input. Run URAI Jobs Live Verification after DNS/SSL is ready."
