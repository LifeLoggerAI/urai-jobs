name: URAI Jobs Production Deploy

on:
  workflow_dispatch:
    inputs:
      confirm_launch_unlock:
        description: Type LAUNCH-UNLOCK to confirm production signoffs are complete
        required: true
        type: string
      target:
        description: Firebase target alias
        required: true
        default: prod
        type: choice
        options:
          - prod
          - staging
          - dev
      deploy_workers:
        description: Deploy Cloud Run workers before Firebase deploy
        required: true
        default: true
        type: boolean
      run_smoke:
        description: Run callable production smoke after deploy
        required: true
        default: false
        type: boolean

env:
  DEPLOY_PROJECT_ID: ${{ secrets.URAI_JOBS_FIREBASE_PROJECT_ID || secrets.FIREBASE_PROJECT_ID || secrets.GCLOUD_PROJECT || secrets.GOOGLE_CLOUD_PROJECT }}

jobs:
  deploy:
    name: Deploy URAI Jobs Runtime
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: ${{ inputs.target }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Require explicit launch unlock
        run: |
          if [ "${{ inputs.confirm_launch_unlock }}" != "LAUNCH-UNLOCK" ]; then
            echo "confirm_launch_unlock must exactly equal LAUNCH-UNLOCK."
            exit 1
          fi

      - name: Enable pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.15.9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Java 21 for Firebase tooling
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_URAI_JOBS || secrets.GCP_SERVICE_ACCOUNT_JSON }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.DEPLOY_PROJECT_ID }}

      - name: Install Firebase CLI
        run: pnpm add -g firebase-tools

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Production env precheck
        env:
          URAI_ENV: prod
          NODE_ENV: production
          FIREBASE_PROJECT_ID: ${{ env.DEPLOY_PROJECT_ID }}
          GCLOUD_PROJECT: ${{ env.DEPLOY_PROJECT_ID }}
          GOOGLE_CLOUD_PROJECT: ${{ env.DEPLOY_PROJECT_ID }}
          GCP_REGION: ${{ secrets.GCP_REGION }}
          API_ALLOWED_ORIGINS: ${{ secrets.API_ALLOWED_ORIGINS }}
          WEBHOOK_SIGNING_SECRET: ${{ secrets.WEBHOOK_SIGNING_SECRET }}
          MAILGUN_KEY: ${{ secrets.MAILGUN_KEY }}
          MAILGUN_DOMAIN: ${{ secrets.MAILGUN_DOMAIN }}
          GCS_BUCKET_NAME: ${{ secrets.GCS_BUCKET_NAME }}
          NARRATOR_WORKER_URL: ${{ secrets.NARRATOR_WORKER_URL }}
          ASSET_WORKER_URL: ${{ secrets.ASSET_WORKER_URL }}
          SPATIAL_WORKER_URL: ${{ secrets.SPATIAL_WORKER_URL }}
          STUDIO_WORKER_URL: ${{ secrets.STUDIO_WORKER_URL }}
          WORKER_SERVICE_ACCOUNT_EMAIL: ${{ secrets.WORKER_SERVICE_ACCOUNT_EMAIL }}
        run: pnpm prod:precheck

      - name: Activation readiness guard
        run: pnpm activation:verify

      - name: Build and verify
        run: |
          pnpm urai-jobs:verify
          pnpm typecheck
          pnpm build
          pnpm test
          pnpm urai-jobs:smoke

      - name: Deploy Cloud Run workers
        if: ${{ inputs.deploy_workers }}
        env:
          URAI_ENV: prod
          GCLOUD_PROJECT: ${{ env.DEPLOY_PROJECT_ID }}
          GCP_REGION: ${{ secrets.GCP_REGION }}
          GCS_BUCKET_NAME: ${{ secrets.GCS_BUCKET_NAME }}
        run: pnpm deploy:workers

      - name: Deploy Firebase runtime
        env:
          URAI_ENV: prod
          FIREBASE_PROJECT_ID: ${{ env.DEPLOY_PROJECT_ID }}
          GCLOUD_PROJECT: ${{ env.DEPLOY_PROJECT_ID }}
          GOOGLE_CLOUD_PROJECT: ${{ env.DEPLOY_PROJECT_ID }}
          GCP_REGION: ${{ secrets.GCP_REGION }}
          API_ALLOWED_ORIGINS: ${{ secrets.API_ALLOWED_ORIGINS }}
          WEBHOOK_SIGNING_SECRET: ${{ secrets.WEBHOOK_SIGNING_SECRET }}
          MAILGUN_KEY: ${{ secrets.MAILGUN_KEY }}
          MAILGUN_DOMAIN: ${{ secrets.MAILGUN_DOMAIN }}
          GCS_BUCKET_NAME: ${{ secrets.GCS_BUCKET_NAME }}
          NARRATOR_WORKER_URL: ${{ secrets.NARRATOR_WORKER_URL }}
          ASSET_WORKER_URL: ${{ secrets.ASSET_WORKER_URL }}
          SPATIAL_WORKER_URL: ${{ secrets.SPATIAL_WORKER_URL }}
          STUDIO_WORKER_URL: ${{ secrets.STUDIO_WORKER_URL }}
          WORKER_SERVICE_ACCOUNT_EMAIL: ${{ secrets.WORKER_SERVICE_ACCOUNT_EMAIL }}
        run: pnpm deploy:firebase:prod -- ${{ inputs.target }}

      - name: Production callable smoke
        if: ${{ inputs.run_smoke }}
        env:
          FIREBASE_PROJECT_ID: ${{ env.DEPLOY_PROJECT_ID }}
          GCLOUD_PROJECT: ${{ env.DEPLOY_PROJECT_ID }}
          GCP_REGION: ${{ secrets.GCP_REGION }}
          PROD_SMOKE_ID_TOKEN: ${{ secrets.PROD_SMOKE_ID_TOKEN }}
          PROD_SMOKE_JOB_TYPE: narrator.tts
          PROD_SMOKE_TEXT: URAI Jobs Runtime production smoke test
        run: pnpm prod:smoke

      - name: Smoke skipped notice
        if: ${{ !inputs.run_smoke }}
        run: echo "Production callable smoke was skipped. Run it after PROD_SMOKE_ID_TOKEN is configured."
