name: URAI Jobs Runtime CI

on:
  pull_request:
  push:
    branches:
      - main
      - hardening/urai-jobs-runtime

jobs:
  validate:
    name: Validate runtime
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.15.9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify repository invariants
        run: pnpm urai-jobs:verify

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Unit tests
        run: pnpm test

      - name: Smoke checks
        run: pnpm urai-jobs:smoke

  emulator-e2e:
    name: Callable emulator E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.15.9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Firebase CLI
        run: pnpm add -g firebase-tools

      - name: Build functions and shared types
        run: pnpm --filter @urai-jobs/shared-types build && pnpm --filter urai-jobs-functions build

      - name: Start Firebase emulators
        run: |
          firebase emulators:start --only firestore,auth,functions,pubsub --project demo-urai-jobs > /tmp/urai-jobs-emulators.log 2>&1 &
          echo $! > /tmp/urai-jobs-emulators.pid
          sleep 30

      - name: Run callable E2E
        env:
          FIRESTORE_EMULATOR_HOST: 127.0.0.1:8080
          FIREBASE_AUTH_EMULATOR_HOST: 127.0.0.1:9099
          FUNCTIONS_EMULATOR_ORIGIN: http://127.0.0.1:5001
          FIREBASE_PROJECT_ID: demo-urai-jobs
          GCLOUD_PROJECT: demo-urai-jobs
        run: pnpm urai-jobs:e2e

      - name: Print emulator logs on failure
        if: failure()
        run: cat /tmp/urai-jobs-emulators.log || true

      - name: Stop Firebase emulators
        if: always()
        run: |
          if [ -f /tmp/urai-jobs-emulators.pid ]; then
            kill $(cat /tmp/urai-jobs-emulators.pid) || true
          fi
