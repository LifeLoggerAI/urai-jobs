name: URAI Jobs Runtime CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - hardening/urai-jobs-runtime

jobs:
  validate:
    name: Validate runtime
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.15.9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Verify activation readiness guardrails
        run: pnpm activation:verify

      - name: Verify repository invariants
        run: pnpm urai-jobs:verify

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Unit tests
        run: pnpm test

      - name: Smoke checks
        run: pnpm urai-jobs:smoke

  emulator-e2e:
    name: Callable emulator E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.15.9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Java 21 for Firebase emulators
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build functions and shared types
        run: pnpm --filter @urai-jobs/shared-types build && pnpm --filter urai-jobs-functions build

      - name: Run callable E2E in Firebase emulators
        run: npx --yes firebase-tools@latest emulators:exec --only firestore,auth,functions "node scripts/urai-jobs-e2e.mjs"
