name: Career Surfaces CI

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "web/src/lib/career*.ts"
      - "web/src/pages/Career*.tsx"
      - "web/src/App.tsx"
      - "web/src/pages/LandingPage.tsx"
      - "workers/career-worker/**"
      - "scripts/career-surfaces-verify.mjs"
      - "scripts/career-runtime-smoke.mjs"
      - "scripts/activation-readiness-verify.mjs"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/career-surfaces-ci.yml"
  push:
    branches:
      - main
    paths:
      - "web/src/lib/career*.ts"
      - "web/src/pages/Career*.tsx"
      - "web/src/App.tsx"
      - "web/src/pages/LandingPage.tsx"
      - "workers/career-worker/**"
      - "scripts/career-surfaces-verify.mjs"
      - "scripts/career-runtime-smoke.mjs"
      - "scripts/activation-readiness-verify.mjs"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/career-surfaces-ci.yml"

jobs:
  career-surfaces:
    name: Verify career surfaces
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.15.9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Verify career surfaces
        run: pnpm career:verify

      - name: Verify career runtime smoke
        run: pnpm career:smoke

      - name: Verify activation readiness
        run: pnpm activation:verify

      - name: Typecheck web
        run: pnpm --dir web typecheck

      - name: Build web
        run: pnpm --dir web build

      - name: Typecheck career worker
        run: pnpm career-worker:typecheck

      - name: Build career worker
        run: pnpm career-worker:build
