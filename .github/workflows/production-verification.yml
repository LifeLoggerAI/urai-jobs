name: production-verification

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Workspace verification
        run: pnpm check:workspace

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Production precheck
        run: pnpm prod:precheck
