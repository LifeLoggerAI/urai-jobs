name: production-verification

on:
  push:
    branches:
      - urai-jobs-worker-lifecycle-lock-20260628
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest

    env:
      CI: true
      URAI_ENV: ci
      URAI_JOBS_PROOF_DIR: launch-proof/urai-jobs-production-lock/20260628T203420Z/ci-run
      FIREBASE_PROJECT_ID: demo-urai-jobs
      GCLOUD_PROJECT: demo-urai-jobs
      GOOGLE_CLOUD_PROJECT: demo-urai-jobs
      GCP_REGION: us-central1
      GCS_BUCKET_NAME: demo-urai-jobs-artifacts
      FIREBASE_HOSTING_SITE: urai-jobs-563121397472

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.15.9

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Local lifecycle proof
        run: npm run jobs:lifecycle

      - name: Production lock static check
        run: npm run check:production-lock

      - name: Production claims check
        run: npm run check:production-claims

      - name: Route verification
        run: npm run verify:routes

      - name: Jobs verification
        run: npm run jobs:verify

      - name: Typecheck
        run: npm run check:types

      - name: Build
        run: npm run build

      - name: Full test gate
        run: npm test

      - name: Deploy precheck only
        run: npm run urai-jobs:deploy-precheck

      - name: Production smoke reminder
        run: |
          echo "No deploy is performed by this verification workflow."
          echo "Production-ready status still requires explicit operator-approved production lifecycle smoke after deploy."
